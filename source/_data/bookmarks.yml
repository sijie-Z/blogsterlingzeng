- category: "每天都在用"
  icon: fa-solid fa-heart
  items:
    - name: VS Code
      link: https://code.visualstudio.com/
      image: https://code.visualstudio.com/favicon.ico
      description: 用过很多编辑器，最后还是回到它。插件生态太强了。
    - name: GitHub
      link: https://github.com
      image: https://github.githubassets.com/favicons/favicon.svg
      description: 看别人的项目是最好的学习方式。
    - name: Chrome DevTools
      link: https://developer.chrome.com/docs/devtools/
      image: https://developer.chrome.com/favicon.ico
      description: 前端调试的瑞士军刀。Performance 面板帮我解决过很多性能问题。
    - name: iTerm2
      link: https://iterm2.com/
      image: https://iterm2.com/favicon.ico
      description: macOS 终端。分屏、搜索、自动补全——用了就回不去了。

