- date: 2026-05-08
  content: |
    博客终于上线了。说"终于"是因为这个念头在我脑子里盘旋了至少两年。
    一直在等"准备好了"的那一刻，后来发现那一刻永远不会来。
    先做出来，再慢慢改。这大概是编程教会我最重要的一件事。

- date: 2026-05-07
  content: |
    花了一整天选主题，从 Hugo 到 Hexo，从 Butterfly 到 Redefine。
    选技术栈和选餐厅一样，看太多评价反而更纠结。
    最后选了 Redefine，原因很简单：它的文档写得好。
    一个项目文档的质量，往往反映了代码的质量。

- date: 2026-05-06
  content: |
    今天 debug 到凌晨两点。一个看似简单的异步问题，排查了四个小时。
    最后发现是 Promise 链里漏了一个 return。
    这种 bug 最气人——不报错，不崩溃，就是结果不对。
    但找到问题的那一刻，那种"原来如此"的感觉，确实是编程独有的快乐。

- date: 2026-05-05
  content: |
    重读了自己两年前写的代码，发现两个问题：
    1. 变量命名真的很烂
    2. 逻辑其实很简单，但被我写得很复杂
    成长大概就是这样——你能看出过去自己的问题了。

- date: 2026-05-04
  content: |
    有人问我"学编程最重要的是什么"。
    我想了很久，答案是：忍受不确定性的能力。
    你永远不知道下一个 bug 在哪里，永远不知道这个方案能不能行。
    但你得继续写下去。

- date: 2026-05-03
  content: |
    今天把一个 200 行的函数重构成了 5 个 40 行的函数。
    代码行数没变，但可读性提升了十倍。
    好的代码不是短，而是每个部分都只做一件事。
