# Hexo Configuration
# Site
title: "Sterling Zeng的个人博客"
subtitle: "Keep Rolling, Keep Coding"
description: "记录技术与生活的个人博客，分享编程经验、技术探索与成长感悟"
keywords:
  - 技术博客
  - 编程
  - 前端开发
  - 后端开发
  - Sterling Zeng
  - 个人博客
author: Sterling Zeng
language:
  - zh-CN
  - en
timezone: "Asia/Shanghai"

# URL
url: https://sterlingzeng.cn
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - "css/**"
  - "js/**"
  - "images/**"
  - "data/**"
  - "music/**"

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: false
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: true
  tab_replace: '  '
  wrap: true
  hljs: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
  - 前端开发
  - 后端开发
  - 算法与数据结构
  - 开发工具
  - 项目实战
  - 生活随笔
  - 学习笔记
  - 技术思考
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html

# Feed
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 200
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template:

# Word Count
wordcount:
  enable: true
  count: true
  min2read: true
  # totalcount: true
  # awl: 4
  # wpm: 275

# Theme
theme: redefine

# Deployment
deploy:
  type: ''
